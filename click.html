<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>点击计数器</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 100vh;
    }
    .counter-card {
      position: relative;
      z-index: 10;
      background: #12121a;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 32px;
      padding: 60px 80px;
      text-align: center;
      box-shadow: 0 0 80px rgba(0,255,136,0.03), inset 0 1px 0 rgba(255,255,255,0.05);
      animation: cardEntry 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes cardEntry {
      from { opacity: 0; transform: translateY(40px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .title {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 6px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 32px;
    }
    .count-display {
      font-size: 140px;
      font-weight: 900;
      line-height: 1;
      color: #00ff88;
      text-shadow: 0 0 40px rgba(0,255,136,0.3), 0 0 80px rgba(0,255,136,0.1);
      margin-bottom: 48px;
      user-select: none;
    }
    .count-display.pop { animation: popAnim 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes popAnim {
      0% { transform: scale(1); }
      50% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
    .count-display.reset-anim { animation: resetAnim 0.5s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes resetAnim {
      0% { transform: scale(1); opacity: 1; }
      30% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .button-group { display: flex; gap: 16px; justify-content: center; }
    .btn {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 700;
      padding: 16px 40px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
      outline: none;
      user-select: none;
    }
    .btn:active { transform: scale(0.92); }
    .btn-primary {
      background: #00ff88;
      color: #0a0a0f;
      box-shadow: 0 0 24px rgba(0,255,136,0.2);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary:hover {
      box-shadow: 0 0 48px rgba(0,255,136,0.35);
      transform: translateY(-2px);
    }
    .btn-icon { font-size: 20px; line-height: 1; }
    .btn-reset {
      background: transparent;
      color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .btn-reset:hover {
      color: #fff;
      border-color: rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.03);
    }
    .glow-orb {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .glow-orb-1 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(0,255,136,0.06) 0%, transparent 70%);
      top: -100px; right: -80px;
      animation: orbFloat 8s ease-in-out infinite;
    }
    .glow-orb-2 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(0,255,136,0.04) 0%, transparent 70%);
      bottom: -60px; left: -60px;
      animation: orbFloat 10s ease-in-out infinite reverse;
    }
    @keyframes orbFloat {
      0%,100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }
    @media (max-width: 600px) {
      .counter-card { padding: 40px 32px; margin: 16px; border-radius: 24px; }
      .count-display { font-size: 96px; }
      .btn { padding: 14px 28px; font-size: 14px; }
      .title { font-size: 12px; letter-spacing: 4px; }
      .glow-orb-1 { width: 250px; height: 250px; top: -60px; right: -40px; }
      .glow-orb-2 { width: 200px; height: 200px; bottom: -40px; left: -40px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="counter-card">
      <h1 class="title">点击计数器</h1>
      <div class="count-display" id="countDisplay">0</div>
      <div class="button-group">
        <button class="btn btn-primary" id="incrementBtn"><span class="btn-icon">+</span>点击</button>
        <button class="btn btn-reset" id="resetBtn">重置</button>
      </div>
    </div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
  </div>
  <script>
    let count = 0;
    const d = document.getElementById('countDisplay');
    document.getElementById('incrementBtn').onclick = () => { count++; d.textContent = count; d.classList.remove('pop'); void d.offsetWidth; d.classList.add('pop'); };
    document.getElementById('resetBtn').onclick = () => { count = 0; d.classList.remove('pop','reset-anim'); void d.offsetWidth; d.classList.add('reset-anim'); d.textContent = '0'; };
    document.onkeydown = e => {
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); count++; d.textContent = count; d.classList.remove('pop'); void d.offsetWidth; d.classList.add('pop'); }
      if (e.key === 'r' || e.key === 'R') { count = 0; d.classList.remove('pop','reset-anim'); void d.offsetWidth; d.classList.add('reset-anim'); d.textContent = '0'; }
    };
  </script>
</body>
</html>
